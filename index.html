<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-Style Trainer</title>
  <script type="module" crossorigin src="/3style-trainer/assets/index-CzU93JP2.js"></script>
  <link rel="stylesheet" crossorigin href="/3style-trainer/assets/index-kQN6hq9k.css">
</head>

<body>
    <div id="app">

        <header>
            <div id="scramble">[Scramble]</div>
        </header>

        <main>

            <aside id="leftPanel">
                <h3>Mode</h3>
                <button id="edgeMode" class="selectedMode">Edge</button>
                <button id="cornerMode">Corner</button>
                <button id="allMode">All</button>

                <h3>Buffer</h3>
                <select id="edgeBufferSelect"></select>
                <select id="cornerBufferSelect"></select>
            </aside>

            <section id="centerPanel">

                <div id="cube">Loading</div>

                <button id="newScramble">New</button>

                <div id="credit">
                    <p>3-Style Trainer <br> © 2026 Hugo Pozzi</p>
                </div>

            </section>

            <aside id="rightPanel">
                <h3>Show/Hide</h3>
                <button id="hideCube">Cube</button>
                <button id="hideLeftPanel">Settings</button>
            </aside>

        </main>

    </div>

    <script src="https://cdn.cubing.net/v0/js/cubing/twisty" type="module"></script>
    <script src="https://unpkg.com/cube-solver/dist/bundle.js" type="module"></script>

</body>
</html>
